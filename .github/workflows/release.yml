# Build release binaries for Linux and Windows, then publish a
# GitHub Release with the artifacts.
#
# Artifacts:
#   - pangolin-cli-linux-x86_64.tar.gz   (pgn binary)
#   - pangolin-cli-windows-x86_64.zip    (pgn.exe + DLLs + wintun)
#   - pangolin-gui-windows-x86_64.zip    (pgn.exe + pgn-tray.exe + DLLs + wintun)
#
# Triggered by pushing a tag like `v0.1.0`.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  release-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libopenconnect-dev libclang-dev libssl-dev \
            libdbus-1-dev pkg-config

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-linux

      - name: Build
        run: cargo build --release -p pgn --locked

      - name: Package CLI
        run: |
          mkdir -p dist
          cp target/release/pgn dist/
          cp README.md LICENSE-* dist/ 2>/dev/null || true
          tar -czf pangolin-cli-linux-x86_64.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pangolin-cli-linux-x86_64
          path: pangolin-cli-linux-x86_64.tar.gz

  release-windows:
    name: Windows x86_64
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-windows

      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gnutls
            mingw-w64-x86_64-libxml2
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-lz4
            mingw-w64-x86_64-p11-kit
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-nettle
            mingw-w64-x86_64-autotools
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-libidn2
            mingw-w64-x86_64-jq
            mingw-w64-x86_64-tools-git
            git
            make
            automake
            autoconf
            libtool

      - name: Build libopenconnect
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          cd /tmp
          git clone --depth 1 https://gitlab.com/openconnect/openconnect.git
          cd openconnect
          ./autogen.sh
          mkdir -p /mingw64/etc
          echo "#!/bin/sh" > /mingw64/etc/vpnc-script
          chmod +x /mingw64/etc/vpnc-script
          ./configure --prefix=/mingw64 --with-gnutls --without-openssl \
            --disable-nls --disable-docs --without-libpskc --without-stoken \
            --without-libpcsclite --with-vpnc-script=/mingw64/etc/vpnc-script
          make -j$(nproc)
          make install

      - name: Generate MSVC import library
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          cd /tmp
          gendef /mingw64/bin/libopenconnect-5.dll

      - name: Create .lib from .def
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products '*' -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $libExe = Get-ChildItem "$vsPath\VC\Tools\MSVC\*\bin\Hostx64\x64\lib.exe" | Select-Object -First 1
          & $libExe /def:D:\a\_temp\msys64\tmp\libopenconnect-5.def /out:D:\a\_temp\msys64\mingw64\lib\openconnect.lib /machine:x64

      - name: Build pgn (CLI)
        env:
          OPENCONNECT_DIR: D:\a\_temp\msys64\mingw64
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}/bin
        run: cargo build --release -p pgn --locked

      - name: Build pgn-tray (GUI)
        env:
          OPENCONNECT_DIR: D:\a\_temp\msys64\mingw64
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}/bin
        run: cargo build --release --manifest-path bins/pgn-tray/Cargo.toml

      - name: Collect DLLs
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          mkdir -p dll-cache
          cp /mingw64/bin/libopenconnect-5.dll dll-cache/
          ldd /mingw64/bin/libopenconnect-5.dll | grep mingw64 | awk '{print $3}' | \
            while read dll; do cp "$dll" dll-cache/; done

      - name: Package CLI and GUI
        shell: pwsh
        run: |
          # Download Wintun
          Invoke-WebRequest -Uri "https://www.wintun.net/builds/wintun-0.14.1.zip" -OutFile wintun.zip
          Expand-Archive -Path wintun.zip -DestinationPath wintun-extract -Force

          # --- CLI package ---
          New-Item -ItemType Directory -Path pangolin-cli-win -Force
          Copy-Item target\release\pgn.exe pangolin-cli-win\
          Copy-Item dll-cache\* pangolin-cli-win\
          Copy-Item wintun-extract\wintun\bin\amd64\wintun.dll pangolin-cli-win\
          Copy-Item README.md pangolin-cli-win\ -ErrorAction SilentlyContinue
          Compress-Archive -Path pangolin-cli-win\* -DestinationPath pangolin-cli-windows-x86_64.zip -Force

          # --- GUI package ---
          New-Item -ItemType Directory -Path pangolin-gui-win -Force
          Copy-Item target\release\pgn.exe pangolin-gui-win\
          Copy-Item bins\pgn-tray\target\release\pgn-tray.exe pangolin-gui-win\
          Copy-Item dll-cache\* pangolin-gui-win\
          Copy-Item wintun-extract\wintun\bin\amd64\wintun.dll pangolin-gui-win\
          Copy-Item README.md pangolin-gui-win\ -ErrorAction SilentlyContinue
          Compress-Archive -Path pangolin-gui-win\* -DestinationPath pangolin-gui-windows-x86_64.zip -Force

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: pangolin-cli-windows-x86_64
          path: pangolin-cli-windows-x86_64.zip

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: pangolin-gui-windows-x86_64
          path: pangolin-gui-windows-x86_64.zip

  create-release:
    name: Create GitHub Release
    needs: [release-linux, release-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            pangolin-cli-linux-x86_64/pangolin-cli-linux-x86_64.tar.gz
            pangolin-cli-windows-x86_64/pangolin-cli-windows-x86_64.zip
            pangolin-gui-windows-x86_64/pangolin-gui-windows-x86_64.zip
